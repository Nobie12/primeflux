services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: primeflux_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: primeflux_db
      POSTGRES_USER: primeflux_user
      POSTGRES_PASSWORD: primeflux_password
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
    driver: local
