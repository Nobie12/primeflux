name: Branch Integration Pipeline

on:
  push:
    branches: [ dev, master ]
  workflow_dispatch:

jobs:
  validate-and-test:
    name: Integration Validation
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: primeflux_db_dev
          POSTGRES_USER: primeflux_user_dev
          POSTGRES_PASSWORD: primeflux_password_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U primeflux_user_dev -d primeflux_db_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install Dependencies
        run: uv sync --frozen

      - name: Run Quality Verification (Ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run Test Suite
        env:
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_DB: 0
          DATABASE_URL: postgres://primeflux_user_dev:primeflux_password_dev@127.0.0.1:5432/primeflux_db_dev
        run: uv run pytest

  deploy-services:
    name: Deploy Application
    needs: validate-and-test # Will only run if the validation job passes perfectly
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate Deployment Target
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "Execution Context: Production Branch (master)"
            echo "Place your production CD deployment scripts/hooks here."
          elif [ "${{ github.ref_name }}" = "dev" ]; then
            echo "Execution Context: Development Branch (dev)"
            echo "Place your staging/dev CD deployment scripts/hooks here."
          fi
